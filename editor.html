<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quantumult X List 编辑器</title>
<style>
:root{--bg:#f5f7fa;--card:#fff;--text:#17212f;--muted:#667085;--line:#dfe4ea;--brand:#0969da;--bad:#b42318;--good:#0d7a37}@media(prefers-color-scheme:dark){:root{--bg:#10151c;--card:#18202a;--text:#edf2f7;--muted:#aab4c2;--line:#364250;--brand:#75b2ff;--bad:#ff948c;--good:#75d39b}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:1400px;margin:auto;padding:18px}.top,.row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}.top{justify-content:space-between;align-items:flex-start;margin-bottom:16px}h1{font-size:28px;margin:0}.sub,.status,.tip{color:var(--muted)}.sub{margin:5px 0 0}.card{background:var(--card);border:1px solid var(--line);border-radius:14px}details{padding:14px;margin-bottom:14px}summary{font-weight:700;cursor:pointer}.settings{display:grid;grid-template-columns:1fr 160px;gap:10px;margin-top:12px}label{display:grid;gap:5px;font-size:13px;color:var(--muted)}input,textarea{width:100%;background:transparent;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:9px 10px;font:inherit;outline:none}.btn{background:transparent;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-weight:650;cursor:pointer}.btn:hover{border-color:var(--brand);color:var(--brand)}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.status{font-size:13px;min-height:19px}.status.good{color:var(--good)}.status.bad{color:var(--bad)}.layout{display:grid;grid-template-columns:270px minmax(0,1fr);gap:14px}.side{padding:14px;min-height:620px}.side h2{font-size:15px;margin:0}.files{display:grid;gap:5px;margin-top:10px;max-height:410px;overflow:auto}.file{border:1px solid transparent;background:transparent;color:var(--text);text-align:left;padding:8px 9px;border-radius:8px;overflow-wrap:anywhere;cursor:pointer}.file:hover,.file.active{background:color-mix(in srgb,var(--brand) 10%,transparent);border-color:color-mix(in srgb,var(--brand) 30%,var(--line))}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:14px}.stat{padding:9px;border:1px solid var(--line);border-radius:9px}.stat b{display:block;font-size:19px;line-height:1.1}.stat span{font-size:11px;color:var(--muted)}.tip{margin-top:15px;padding:10px;border-radius:10px;background:color-mix(in srgb,var(--brand) 8%,transparent);font-size:13px}.editor{overflow:hidden;min-height:620px}.head{padding:13px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.head h2{font-size:15px;margin:0}.toolbar{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}.toolbar input{min-width:160px;flex:1 1 220px}.area{padding:12px}textarea{display:block;min-height:530px;resize:vertical;font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;white-space:pre}.issues{display:none;border-top:1px solid var(--line);padding:10px 14px;max-height:180px;overflow:auto}.issues.show{display:block}.issue{padding:6px 8px;margin:3px 0;border-radius:7px;background:color-mix(in srgb,var(--bad) 13%,transparent);font:12px/1.4 ui-monospace,monospace;cursor:pointer}.issue.warn{background:#fff4cf;color:#6e4a00}.empty{padding:28px 10px;text-align:center;color:var(--muted)}.toast{position:fixed;left:50%;bottom:20px;transform:translate(-50%,20px);opacity:0;pointer-events:none;background:#182230;color:#fff;padding:10px 14px;border-radius:999px;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:860px){.app{padding:12px}.settings,.layout{grid-template-columns:1fr}.side,.editor{min-height:0}.files{max-height:220px}textarea{min-height:430px}h1{font-size:23px}}
</style>
</head>
<body>
<main class="app">
<header class="top"><div><h1>Quantumult X List 编辑器</h1><p class="sub">读取、修改、校验和导出公开 GitHub 仓库中的 .list 分流规则。</p></div><span id="dirty" class="status">未加载文件</span></header>
<details class="card" open><summary>规则来源</summary><div class="settings"><label>GitHub 仓库<input id="repo" value="clxmhcs/quantumult-X-fenliu"></label><label>分支<input id="branch" value="main"></label></div><div class="row" style="margin-top:12px"><button id="read" class="btn primary">读取规则文件</button><span id="status" class="status"></span></div></details>
<section class="layout"><aside class="card side"><h2>规则文件</h2><div id="files" class="files"><div class="empty">点击“读取规则文件”</div></div><div id="stats" class="stats"></div><div class="tip">页面不要求输入账号或密码。修改后可下载 .list，也可复制全文后在 GitHub 文件编辑页粘贴提交。</div></aside><section class="card editor"><div class="head"><div><h2 id="path">尚未选择文件</h2><div id="meta" class="status"></div></div><div class="row"><button id="copy" class="btn">复制全文</button><button id="download" class="btn">下载 .list</button><button id="open" class="btn primary">在 GitHub 编辑</button></div></div><div class="toolbar"><input id="search" placeholder="查找域名、策略或规则"><button id="find" class="btn">下一个</button><button id="add" class="btn">新增规则</button><button id="format" class="btn">整理格式</button><button id="dedupe" class="btn">规则去重</button><button id="header" class="btn">更新头部统计</button><button id="check" class="btn">校验</button></div><div class="area"><textarea id="editor" disabled spellcheck="false" wrap="off"></textarea></div><div id="issues" class="issues"></div></section></section>
</main><div id="toast" class="toast"></div>
<script>
(()=>{const $=id=>document.getElementById(id),e={repo:$("repo"),branch:$("branch"),read:$("read"),files:$("files"),stats:$("stats"),path:$("path"),meta:$("meta"),editor:$("editor"),copy:$("copy"),download:$("download"),open:$("open"),search:$("search"),find:$("find"),add:$("add"),format:$("format"),dedupe:$("dedupe"),header:$("header"),check:$("check"),issues:$("issues"),status:$("status"),dirty:$("dirty"),toast:$("toast")},s={files:[],path:"",original:"",find:0,timer:0},known=new Set(["HOST","HOST-SUFFIX","HOST-KEYWORD","HOST-WILDCARD","IP-CIDR","IP6-CIDR","GEOIP","USER-AGENT","URL-REGEX","PROCESS-NAME","PROCESS-PATH","FINAL","AND","OR","NOT"]),headers=new Set(["HOST","HOST-SUFFIX","HOST-KEYWORD","HOST-WILDCARD","IP-CIDR","IP6-CIDR","USER-AGENT","TOTAL"]),shown=["TOTAL","HOST","HOST-SUFFIX","HOST-KEYWORD","IP-CIDR","IP6-CIDR","GEOIP","USER-AGENT"],text=v=>String(v??"").replace(/\r\n/g,"\n"),repo=()=>e.repo.value.trim().replace(/^https?:\/\/github\.com\//i,"").replace(/\/$/,""),branch=()=>e.branch.value.trim()||"main",api=p=>`https://api.github.com/repos/${repo()}/${p}`,safe=p=>p.split("/").map(encodeURIComponent).join("/"),rule=l=>l.trim()&&!l.trimStart().startsWith("#"),parts=l=>l.split(",").map(x=>x.trim());function toast(v){clearTimeout(s.timer);e.toast.textContent=v;e.toast.className="toast show";s.timer=setTimeout(()=>e.toast.className="toast",3000)}function status(v,k=""){e.status.textContent=v;e.status.className=`status ${k}`}function decode(v){const x=atob(v.replace(/\n/g,""));return new TextDecoder().decode(Uint8Array.from(x,c=>c.charCodeAt(0)))}async function req(u){const r=await fetch(u,{headers:{Accept:"application/vnd.github+json"}}),d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.message||`GitHub 请求失败（${r.status}）`);return d}function count(v){const c={TOTAL:0};for(const l of text(v).split("\n")){if(!rule(l))continue;const t=(parts(l)[0]||"").toUpperCase();c[t]=(c[t]||0)+1;c.TOTAL++}return c}function esc(v){return String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c])}function refresh(){const c=count(e.editor.value);e.stats.innerHTML=shown.filter(k=>c[k]||k==="TOTAL").map(k=>`<div class="stat"><b>${c[k]||0}</b><span>${esc(k)}</span></div>`).join("");e.dirty.textContent=!s.path?"未加载文件":e.editor.value===s.original?"已同步":"有未保存修改"}function norm(l){return rule(l)?parts(l).join(","):l.replace(/[ \t]+$/g,"")}function render(){if(!s.files.length){e.files.innerHTML='<div class="empty">未找到 .list 文件</div>';return}e.files.innerHTML="";for(const f of s.files){const b=document.createElement("button");b.className=`file${f.path===s.path?" active":""}`;b.textContent=f.path;b.onclick=()=>load(f.path);e.files.appendChild(b)}}async function readFiles(){if(!/^[^/\s]+\/[^/\s]+$/.test(repo())){status("仓库格式应为 用户名/仓库名","bad");return}status("正在读取 .list 文件…");try{const d=await req(api(`git/trees/${encodeURIComponent(branch())}?recursive=1`));s.files=(d.tree||[]).filter(x=>x.type==="blob"&&/\.list$/i.test(x.path)).sort((a,b)=>a.path.localeCompare(b.path,"zh-CN"));render();status(`找到 ${s.files.length} 个 .list 文件`,"good");if(s.files.length){const first=s.files.find(x=>/(^|\/)Apple\.list$/i.test(x.path))||s.files[0];load(first.path)}}catch(x){s.files=[];render();status(x.message,"bad")}}async function load(path){if(s.path&&e.editor.value!==s.original&&!confirm("当前文件有未保存修改。仍然切换文件吗？"))return;status(`正在读取 ${path}…`);try{const d=await req(api(`contents/${safe(path)}?ref=${encodeURIComponent(branch())}`));s.path=path;s.original=decode(d.content||"");e.editor.value=s.original;e.editor.disabled=false;e.path.textContent=path;e.meta.textContent=`${count(s.original).TOTAL} 条规则`;e.issues.classList.remove("show");render();refresh();status("文件已加载","good")}catch(x){status(x.message,"bad")}}function dt(){const d=new Date(),p=x=>String(x).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}function format(){const end=/\n$/.test(e.editor.value);let v=text(e.editor.value).split("\n").map(norm).join("\n");if(!end)v=v.replace(/\n$/,"");e.editor.value=v;refresh();toast("已整理规则格式")}function dedupe(){const seen=new Set();let n=0;e.editor.value=text(e.editor.value).split("\n").filter(l=>{if(!rule(l))return true;const k=norm(l);if(seen.has(k)){n++;return false}seen.add(k);return true}).join("\n");refresh();toast(n?`已移除 ${n} 条重复规则`:"没有完全重复的规则")}function updateHeader(){const c=count(e.editor.value);let hit=false;e.editor.value=text(e.editor.value).split("\n").map(l=>{let m=l.match(/^(#\s*UPDATED\s*:\s*).*/i);if(m){hit=true;return m[1]+dt()}m=l.match(/^#\s*([A-Z0-9-]+)\s*:\s*\d+\s*$/i);if(m&&headers.has(m[1].toUpperCase())){hit=true;const n=m[1].toUpperCase();return `# ${n}: ${c[n]||0}`}return l}).join("\n");refresh();toast(hit?"已更新现有头部统计":"当前文件没有可更新的统计头部")}function go(n){const a=e.editor.value.split("\n"),start=a.slice(0,Math.max(0,n-1)).join("\n").length+(n>1?1:0);e.editor.focus();e.editor.setSelectionRange(start,start+(a[n-1]||"").length);e.editor.scrollTop=((n-1)/Math.max(a.length-1,1))*(e.editor.scrollHeight-e.editor.clientHeight)}function check(){const list=[];text(e.editor.value).split("\n").forEach((l,i)=>{if(!rule(l))return;const p=parts(l),t=(p[0]||"").toUpperCase();if(!known.has(t))list.push(["warn",i+1,`未识别类型 ${t||"(空)"}`]);if(p.length<2||!p[1])list.push(["bad",i+1,"缺少匹配内容或策略"]);if(t!=="FINAL"&&p.length<3)list.push(["bad",i+1,"缺少策略组 / 动作"])});if(!list.length){e.issues.innerHTML='<div class="issue" style="background:color-mix(in srgb,var(--good) 16%,transparent);cursor:default">校验通过：未发现基础格式问题。</div>';e.issues.classList.add("show");toast("校验通过");return}e.issues.innerHTML=list.map(x=>`<div class="issue ${x[0]==="warn"?"warn":""}" data-line="${x[1]}">第 ${x[1]} 行：${esc(x[2])}</div>`).join("");e.issues.classList.add("show");e.issues.querySelectorAll("[data-line]").forEach(x=>x.onclick=()=>go(+x.dataset.line));toast(`发现 ${list.length} 个待检查项`)}function copy(){navigator.clipboard.writeText(e.editor.value).then(()=>toast("已复制全文")).catch(()=>{e.editor.select();document.execCommand("copy");toast("已复制全文")})}function download(){const name=s.path?s.path.split("/").pop():"QuantumultX.list",u=URL.createObjectURL(new Blob([text(e.editor.value)],{type:"text/plain;charset=utf-8"})),a=document.createElement("a");a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1000)}function find(){const q=e.search.value.trim();if(!q){e.search.focus();return}const all=e.editor.value.toLowerCase(),n=q.toLowerCase();let at=all.indexOf(n,Math.max(0,e.editor.selectionEnd||s.find));if(at<0)at=all.indexOf(n);if(at<0){toast("没有找到匹配内容");return}e.editor.focus();e.editor.setSelectionRange(at,at+q.length);s.find=at+q.length;go(e.editor.value.slice(0,at).split("\n").length)}function add(){if(!s.path){toast("请先加载一个文件");return}const t=(prompt("规则类型：","HOST")||"").trim().toUpperCase(),v=(prompt("匹配内容：","apps.apple.com")||"").trim(),p=(prompt("策略组 / 动作：","Apple")||"").trim();if(!t||!v||!p)return;e.editor.value=e.editor.value.replace(/\s*$/,"")+(e.editor.value.trim()?"\n":"")+`${t},${v},${p}\n`;refresh();toast("已新增规则")}function open(){if(!s.path){toast("请先选择一个文件");return}window.open(`https://github.com/${repo()}/edit/${branch()}/${safe(s.path)}`,"_blank","noopener")}e.read.onclick=readFiles;e.copy.onclick=copy;e.download.onclick=download;e.open.onclick=open;e.find.onclick=find;e.add.onclick=add;e.format.onclick=format;e.dedupe.onclick=dedupe;e.header.onclick=updateHeader;e.check.onclick=check;e.editor.oninput=refresh;e.search.onkeydown=x=>{if(x.key==="Enter")find()};e.editor.onkeydown=x=>{if(x.key==="Tab"){x.preventDefault();e.editor.setRangeText("  ",e.editor.selectionStart,e.editor.selectionEnd,"end");refresh()}};refresh()})();
</script>
</body>
