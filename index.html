<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Quantumult X List 编辑器</title>
<style>
:root{--bg:#f5f7fa;--card:#fff;--text:#17212f;--muted:#667085;--line:#dfe4ea;--brand:#0969da;--bad:#b42318;--good:#0d7a37;--warn:#915f00;--radius:14px}@media(prefers-color-scheme:dark){:root{--bg:#0f141b;--card:#171e27;--text:#edf2f7;--muted:#a8b3c2;--line:#34404e;--brand:#6caeff;--bad:#ff938b;--good:#70d59a;--warn:#f2c46d}}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:1500px;margin:auto;padding:18px}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}h1{font-size:28px;margin:0;letter-spacing:-.02em}.sub{margin:5px 0 0;color:var(--muted)}.badge{white-space:nowrap;border:1px solid var(--line);border-radius:999px;padding:4px 10px;color:var(--muted);font-size:13px}.card{border:1px solid var(--line);border-radius:var(--radius);background:var(--card)}details{padding:14px;margin-bottom:14px}summary{font-weight:700;cursor:pointer}.settings{display:grid;grid-template-columns:1.4fr .45fr 1.4fr;gap:10px;margin-top:12px}label{display:grid;gap:5px;color:var(--muted);font-size:13px}input,textarea{width:100%;background:transparent;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 10px;font:inherit;outline:none}input:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 20%,transparent)}.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.actions{margin-top:12px}.btn{border:1px solid var(--line);border-radius:9px;padding:8px 11px;background:transparent;color:var(--text);font-weight:650;cursor:pointer}.btn:hover{border-color:var(--brand);color:var(--brand)}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn.primary:hover{color:#fff;filter:brightness(.93)}.status{font-size:13px;color:var(--muted);min-height:19px}.status.good{color:var(--good)}.status.bad{color:var(--bad)}.grid{display:grid;grid-template-columns:280px minmax(0,1fr);gap:14px}.side{padding:14px;min-height:625px}.side h2,.head h2{margin:0;font-size:15px}.files{display:grid;gap:5px;margin-top:10px;max-height:410px;overflow:auto}.file{width:100%;text-align:left;border:1px solid transparent;background:transparent;color:var(--text);padding:8px 9px;border-radius:8px;overflow-wrap:anywhere;cursor:pointer}.file:hover,.file.active{border-color:color-mix(in srgb,var(--brand) 35%,var(--line));background:color-mix(in srgb,var(--brand) 10%,transparent)}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:14px}.stat{padding:9px;border:1px solid var(--line);border-radius:9px}.stat b{display:block;font-size:19px;line-height:1.1}.stat span{font-size:11px;color:var(--muted);overflow-wrap:anywhere}.tip{font-size:13px;color:var(--muted);margin-top:15px;padding:10px;border-radius:10px;background:color-mix(in srgb,var(--brand) 8%,transparent)}.editor{overflow:hidden;min-height:625px}.head{padding:13px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.toolbar{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap}.toolbar input{min-width:170px;flex:1 1 230px}.area{padding:12px}textarea{display:block;min-height:530px;resize:vertical;font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;white-space:pre;tab-size:2}.issues{display:none;border-top:1px solid var(--line);padding:10px 14px;max-height:185px;overflow:auto}.issues.show{display:block}.issue{padding:6px 8px;margin:3px 0;border-radius:7px;background:color-mix(in srgb,var(--bad) 13%,transparent);font:12px/1.4 ui-monospace,monospace;cursor:pointer}.issue.warn{background:color-mix(in srgb,var(--warn) 18%,transparent)}.empty{text-align:center;color:var(--muted);padding:30px 10px}.toast{position:fixed;left:50%;bottom:max(20px,env(safe-area-inset-bottom));transform:translate(-50%,20px);opacity:0;pointer-events:none;background:#182230;color:#fff;padding:10px 14px;border-radius:999px;transition:.18s;z-index:5;max-width:calc(100vw - 32px)}.toast.show{transform:translate(-50%,0);opacity:1}@media(max-width:860px){.app{padding:12px}.settings{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.side{min-height:0}.files{max-height:230px}.editor{min-height:0}textarea{min-height:430px}.top{align-items:center}h1{font-size:23px}}
</style>
</head>
<body>
<main class="app">
  <header class="top"><div><h1>Quantumult X List 编辑器</h1><p class="sub">读取、修改、校验并提交 GitHub 中的 .list 分流规则。</p></div><span id="dirty" class="badge">未加载文件</span></header>
  <details class="card" open><summary>GitHub 连接设置</summary>
    <div class="settings">
      <label>规则仓库<input id="repo" value="clxmhcs/quantumult-X-fenliu" autocomplete="off" spellcheck="false"></label>
      <label>分支<input id="branch" value="main" autocomplete="off" spellcheck="false"></label>
      <label>GitHub Fine-grained Personal Access Token（仅当前浏览器会话保存）<input id="token" type="password" placeholder="github_pat_…" autocomplete="off" spellcheck="false"></label>
    </div>
    <div class="row actions"><button id="readFiles" class="btn primary">读取规则文件</button><button id="clearToken" class="btn">清除 Token</button><span id="status" class="status"></span></div>
  </details>
  <section class="grid">
    <aside class="card side"><div class="row"><h2>规则文件</h2><button id="newFile" class="btn">新建</button></div><div id="files" class="files"><div class="empty">点击“读取规则文件”</div></div><div id="stats" class="stats"></div><div class="tip">公开仓库读取不需要 Token。保存时 Token 需要对规则仓库具备 <b>Contents: Read and write</b> 权限；页面不会把 Token 写入 GitHub 或发送到其他服务。</div></aside>
    <section class="card editor">
      <div class="head"><div><h2 id="path">尚未选择文件</h2><div id="meta" class="status"></div></div><div class="row"><button id="download" class="btn">下载 .list</button><button id="save" class="btn primary">提交到 GitHub</button></div></div>
      <div class="toolbar"><input id="search" placeholder="查找域名、策略或规则" autocomplete="off" spellcheck="false"><button id="find" class="btn">下一个</button><button id="add" class="btn">新增规则</button><button id="format" class="btn">整理格式</button><button id="dedupe" class="btn">规则去重</button><button id="headers" class="btn">更新头部统计</button><button id="validate" class="btn">校验</button></div>
      <div class="area"><textarea id="editor" disabled spellcheck="false" wrap="off" placeholder="# NAME: My List&#10;HOST,example.com,Proxy"></textarea></div><div id="issues" class="issues"></div>
    </section>
  </section>
</main>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(() => {
  const $ = id => document.getElementById(id);
  const el = {repo:$("repo"),branch:$("branch"),token:$("token"),read:$("readFiles"),clear:$("clearToken"),files:$("files"),newFile:$("newFile"),stats:$("stats"),path:$("path"),meta:$("meta"),editor:$("editor"),save:$("save"),download:$("download"),search:$("search"),find:$("find"),add:$("add"),format:$("format"),dedupe:$("dedupe"),headers:$("headers"),validate:$("validate"),issues:$("issues"),status:$("status"),dirty:$("dirty"),toast:$("toast")};
  const state = {files:[],path:"",sha:"",original:"",findAt:0,timer:0};
  const known = new Set(["HOST","HOST-SUFFIX","HOST-KEYWORD","HOST-WILDCARD","IP-CIDR","IP6-CIDR","GEOIP","USER-AGENT","URL-REGEX","PROCESS-NAME","PROCESS-PATH","FINAL","AND","OR","NOT"]);
  const headers = new Set(["HOST","HOST-SUFFIX","HOST-KEYWORD","HOST-WILDCARD","IP-CIDR","IP6-CIDR","USER-AGENT","TOTAL"]);
  const displayStats = ["TOTAL","HOST","HOST-SUFFIX","HOST-KEYWORD","IP-CIDR","IP6-CIDR","GEOIP","USER-AGENT"];
  function text(v){return String(v ?? "").replace(/\r\n/g,"\n")}
  function repo(){return el.repo.value.trim().replace(/^https?:\/\/github\.com\//i,"").replace(/\/$/,"")}
  function branch(){return el.branch.value.trim() || "main"}
  function token(){return el.token.value.trim()}
  function validRepo(){return /^[^/\s]+\/[^/\s]+$/.test(repo())}
  function api(path){return `https://api.github.com/repos/${repo()}/${path}`}
  function auth(){const h={Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"};if(token())h.Authorization=`Bearer ${token()}`;return h}
  function b64encode(value){const bytes=new TextEncoder().encode(value);let s="";for(const b of bytes)s+=String.fromCharCode(b);return btoa(s)}
  function b64decode(value){const binary=atob(value.replace(/\n/g,""));return new TextDecoder().decode(Uint8Array.from(binary,c=>c.charCodeAt(0)))}
  function toast(message){clearTimeout(state.timer);el.toast.textContent=message;el.toast.className="toast show";state.timer=setTimeout(()=>el.toast.className="toast",3000)}
  function status(message,kind=""){el.status.textContent=message;el.status.className=`status ${kind}`}
  function isRule(line){return line.trim() && !line.trimStart().startsWith("#")}
  function parts(line){return line.split(",").map(x=>x.trim())}
  function counts(value){const c={TOTAL:0};for(const line of text(value).split("\n")){if(!isRule(line))continue;const type=(parts(line)[0]||"").toUpperCase();c[type]=(c[type]||0)+1;c.TOTAL++}return c}
  function esc(value){return String(value).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c])}
  function refreshUI(){const c=counts(el.editor.value);el.stats.innerHTML=displayStats.filter(k=>c[k]||k==="TOTAL").map(k=>`<div class="stat"><b>${c[k]||0}</b><span>${esc(k)}</span></div>`).join("");const dirty=state.path && el.editor.value!==state.original;el.dirty.textContent=!state.path?"未加载文件":dirty?"有未保存修改":"已同步"}
  function normal(line){return isRule(line)?parts(line).join(","):line.replace(/[ \t]+$/g,"")}
  function changed(note=""){refreshUI();if(note)toast(note)}
  function renderFiles(){if(!state.files.length){el.files.innerHTML='<div class="empty">未找到 .list 文件</div>';return}el.files.innerHTML="";for(const item of state.files){const b=document.createElement("button");b.className=`file${item.path===state.path?" active":""}`;b.textContent=item.path;b.onclick=()=>loadFile(item.path);el.files.appendChild(b)}}
  async function request(url,options={}){const r=await fetch(url,options);const data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.message||`GitHub 请求失败（${r.status}）`);return data}
  async function loadFiles(){if(!validRepo()){status("仓库格式应为 用户名/仓库名","bad");return}status("正在读取 .list 文件…");el.files.innerHTML='<div class="empty">正在读取…</div>';try{const tree=await request(api(`git/trees/${encodeURIComponent(branch())}?recursive=1`),{headers:auth()});state.files=(tree.tree||[]).filter(x=>x.type==="blob"&&/\.list$/i.test(x.path)).sort((a,b)=>a.path.localeCompare(b.path,"zh-CN"));renderFiles();status(`找到 ${state.files.length} 个 .list 文件`,"good");if(state.files.length){const first=state.files.find(x=>(^|/)Apple\.list$/i.test(x.path))||state.files[0];await loadFile(first.path)}}catch(e){state.files=[];renderFiles();status(e.message,"bad")}}
  async function loadFile(path){if(state.path&&el.editor.value!==state.original&&!confirm("当前文件有未保存修改。仍然切换文件吗？"))return;status(`正在读取 ${path}…`);try{const safePath=path.split("/").map(encodeURIComponent).join("/");const data=await request(api(`contents/${safePath}?ref=${encodeURIComponent(branch())}`),{headers:auth()});state.path=path;state.sha=data.sha;state.original=b64decode(data.content||"");el.editor.value=state.original;el.editor.disabled=false;el.path.textContent=path;el.meta.textContent=`${counts(state.original).TOTAL} 条规则 · Git SHA ${data.sha.slice(0,7)}`;el.issues.classList.remove("show");renderFiles();refreshUI();status("文件已加载","good")}catch(e){status(e.message,"bad")}}
  function dateTime(){const d=new Date(),p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}
  function format(){const ending=/\n$/.test(el.editor.value);let out=text(el.editor.value).split("\n").map(normal).join("\n");if(!ending)out=out.replace(/\n$/,"");el.editor.value=out;changed("已整理规则格式")}
  function dedupe(){const seen=new Set();let n=0;const out=text(el.editor.value).split("\n").filter(line=>{if(!isRule(line))return true;const key=normal(line);if(seen.has(key)){n++;return false}seen.add(key);return true});el.editor.value=out.join("\n");changed(n?`已移除 ${n} 条重复规则`:"没有完全重复的规则")}
  function updateHeaders(){const c=counts(el.editor.value);let hit=false;el.editor.value=text(el.editor.value).split("\n").map(line=>{let m=line.match(/^(#\s*UPDATED\s*:\s*).*/i);if(m){hit=true;return m[1]+dateTime()}m=line.match(/^#\s*([A-Z0-9-]+)\s*:\s*\d+\s*$/i);if(m&&headers.has(m[1].toUpperCase())){hit=true;return `# ${m[1].toUpperCase()}: ${c[m[1].toUpperCase()]||0}`}return line}).join("\n");changed(hit?"已更新现有头部统计":"当前文件没有可更新的统计头部")}
  function gotoLine(line){const list=el.editor.value.split("\n");const start=list.slice(0,Math.max(0,line-1)).join("\n").length+(line>1?1:0);el.editor.focus();el.editor.setSelectionRange(start,start+(list[line-1]||"").length);el.editor.scrollTop=((line-1)/Math.max(list.length-1,1))*(el.editor.scrollHeight-el.editor.clientHeight)}
  function validate(){const errors=[];text(el.editor.value).split("\n").forEach((raw,i)=>{if(!isRule(raw))return;const p=parts(raw),type=(p[0]||"").toUpperCase();if(!type)errors.push(["bad",i+1,"缺少规则类型"]);else if(!known.has(type))errors.push(["warn",i+1,`未识别类型 ${type}，请人工确认`]);if(p.length<2||!p[1])errors.push(["bad",i+1,"缺少匹配内容或策略"]);if(type!=="FINAL"&&p.length<3)errors.push(["bad",i+1,"缺少策略组 / 动作"]);if((type==="IP-CIDR"||type==="IP6-CIDR")&&p[1]&&!/^.+\/\d{1,3}$/.test(p[1]))errors.push(["warn",i+1,"CIDR 格式可能不完整"])});if(!errors.length){el.issues.innerHTML='<div class="issue" style="background:color-mix(in srgb,var(--good) 16%,transparent);cursor:default">校验通过：未发现基础格式问题。</div>';el.issues.classList.add("show");toast("校验通过");return true}el.issues.innerHTML=errors.map(x=>`<div class="issue ${x[0]==="warn"?"warn":""}" data-line="${x[1]}">第 ${x[1]} 行：${esc(x[2])}</div>`).join("");el.issues.classList.add("show");el.issues.querySelectorAll("[data-line]").forEach(x=>x.onclick=()=>gotoLine(+x.dataset.line));toast(`发现 ${errors.length} 个待检查项`);return !errors.some(x=>x[0]==="bad")}
  async function save(){if(!state.path){toast("请先选择一个 .list 文件");return}if(!token()){toast("保存需要填写 GitHub Token");el.token.focus();return}if(!validate()){toast("请先处理红色格式错误");return}try{status("正在检查远程版本…");const safePath=state.path.split("/").map(encodeURIComponent).join("/");const latest=await request(api(`contents/${safePath}?ref=${encodeURIComponent(branch())}`),{headers:auth()});if(latest.sha!==state.sha&&!confirm("GitHub 上的文件已被更新。继续覆盖远程版本吗？")){status("已取消保存");return}status("正在提交到 GitHub…");const data=await request(api(`contents/${safePath}`),{method:"PUT",headers:{...auth(),"Content-Type":"application/json"},body:JSON.stringify({message:`编辑 ${state.path}`,content:b64encode(text(el.editor.value)),branch:branch(),sha:latest.sha})});state.sha=data.content?.sha||latest.sha;state.original=el.editor.value;el.meta.textContent=`${counts(state.original).TOTAL} 条规则 · Git SHA ${state.sha.slice(0,7)}`;refreshUI();status("已提交到 GitHub","good");toast("保存成功，Quantumult X 更新资源后即可获取新规则")}catch(e){status(e.message,"bad");toast("保存失败：请检查 Token 权限与仓库设置")}}
  function download(){const name=state.path?state.path.split("/").pop():"QuantumultX.list";const url=URL.createObjectURL(new Blob([text(el.editor.value)],{type:"text/plain;charset=utf-8"}));const a=document.createElement("a");a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
  function find(){const q=el.search.value;if(!q){el.search.focus();return}const all=el.editor.value.toLowerCase(),needle=q.toLowerCase();let at=all.indexOf(needle,Math.max(0,el.editor.selectionEnd||state.findAt));if(at<0)at=all.indexOf(needle);if(at<0){toast("没有找到匹配内容");return}el.editor.focus();el.editor.setSelectionRange(at,at+q.length);state.findAt=at+q.length;gotoLine(el.editor.value.slice(0,at).split("\n").length)}
  function add(){if(!state.path){toast("请先加载一个文件");return}const type=(prompt("规则类型：","HOST")||"").trim().toUpperCase();if(!type)return;const value=(prompt("匹配内容：","apps.apple.com")||"").trim();if(!value)return;const policy=(prompt("策略组 / 动作：","Apple")||"").trim();if(!policy)return;el.editor.value=el.editor.value.replace(/\s*$/,"")+(el.editor.value.trim()?"\n":"")+`${type},${value},${policy}\n`;changed("已新增规则")}
  async function createFile(){if(!token()){toast("新建文件需要 GitHub Token");el.token.focus();return}const path=(prompt("新文件路径（必须以 .list 结尾）：","Custom/NewRules.list")||"").trim();if(!path)return;if(!/\.list$/i.test(path)||path.startsWith("/")||path.includes("..")){toast("文件路径无效");return}const content=`# NAME: New List\n# UPDATED: ${dateTime()}\n# TOTAL: 0\n`;try{status("正在新建文件…");const safePath=path.split("/").map(encodeURIComponent).join("/");await request(api(`contents/${safePath}`),{method:"PUT",headers:{...auth(),"Content-Type":"application/json"},body:JSON.stringify({message:`新建 ${path}`,content:b64encode(content),branch:branch()})});status("文件已创建","good");await loadFiles();await loadFile(path)}catch(e){status(e.message,"bad")}}
  el.read.onclick=loadFiles;el.clear.onclick=()=>{el.token.value="";sessionStorage.removeItem("qx-list-token");toast("已清除当前会话 Token")};el.newFile.onclick=createFile;el.save.onclick=save;el.download.onclick=download;el.find.onclick=find;el.add.onclick=add;el.format.onclick=format;el.dedupe.onclick=dedupe;el.headers.onclick=updateHeaders;el.validate.onclick=validate;el.editor.oninput=()=>changed();el.search.onkeydown=e=>{if(e.key==="Enter")find()};el.editor.onkeydown=e=>{if(e.key==="Tab"){e.preventDefault();el.editor.setRangeText("  ",el.editor.selectionStart,el.editor.selectionEnd,"end");changed()}if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="s"){e.preventDefault();save()}};el.token.oninput=()=>sessionStorage.setItem("qx-list-token",el.token.value);el.token.value=sessionStorage.getItem("qx-list-token")||"";window.onbeforeunload=e=>{if(state.path&&el.editor.value!==state.original){e.preventDefault();e.returnValue=""}};refreshUI();
})();
</script>
</body>
</html>
