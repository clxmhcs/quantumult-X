<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Quantumult X List 编辑器</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #182230;
      --muted: #667085;
      --border: #dde2e8;
      --accent: #0a66c2;
      --accent-strong: #0753a0;
      --danger: #b42318;
      --warn-bg: #fff6e7;
      --error-bg: #fff0ef;
      --ok-bg: #ecfdf3;
      --shadow: 0 10px 30px rgba(16, 24, 40, .08);
      --radius: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f131a;
        --panel: #171d27;
        --text: #edf2f7;
        --muted: #aab4c2;
        --border: #303947;
        --accent: #5ca8ff;
        --accent-strong: #82baff;
        --danger: #ff8b82;
        --warn-bg: #3a2b13;
        --error-bg: #3d1e21;
        --ok-bg: #123523;
        --shadow: none;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { max-width: 1520px; margin: 0 auto; padding: 18px; }
    header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    h1 { margin: 0; font-size: clamp(22px, 4vw, 30px); letter-spacing: -.02em; }
    .subtitle { margin: 5px 0 0; color: var(--muted); }
    .badge { display: inline-flex; align-items: center; min-height: 28px; padding: 3px 10px; border: 1px solid var(--border); border-radius: 999px; color: var(--muted); white-space: nowrap; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .settings { padding: 14px; margin-bottom: 14px; }
    .settings summary { cursor: pointer; font-weight: 700; }
    .settings-grid { display: grid; grid-template-columns: minmax(220px, 1.3fr) minmax(100px, .4fr) minmax(220px, 1.2fr); gap: 10px; margin-top: 12px; }
    label { display: grid; gap: 5px; font-size: 13px; color: var(--muted); }
    input, select, textarea {
      width: 100%; color: var(--text); background: transparent; border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 10px; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
    .settings-actions, .toolbar, .editor-head, .inline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .settings-actions { margin-top: 12px; }
    .grow { flex: 1 1 160px; }
    .button { border: 1px solid var(--border); background: transparent; color: var(--text); padding: 8px 12px; border-radius: 9px; font-weight: 650; }
    .button:hover { border-color: var(--accent); color: var(--accent); }
    .button.primary { color: white; border-color: var(--accent); background: var(--accent); }
    .button.primary:hover { background: var(--accent-strong); color: white; }
    .button.danger { color: var(--danger); }
    .status { min-height: 22px; color: var(--muted); font-size: 13px; }
    .status.ok { color: #16803d; }
    .status.error { color: var(--danger); }
    .workspace { display: grid; grid-template-columns: 280px minmax(0, 1fr); gap: 14px; }
    aside { padding: 14px; min-height: 620px; }
    aside h2, .editor-head h2 { font-size: 15px; margin: 0; }
    .file-list { display: grid; gap: 5px; margin-top: 10px; max-height: 410px; overflow: auto; }
    .file-item { width: 100%; text-align: left; padding: 8px 9px; border: 1px solid transparent; border-radius: 8px; background: transparent; color: var(--text); overflow-wrap: anywhere; }
    .file-item:hover, .file-item.active { background: color-mix(in srgb, var(--accent) 10%, transparent); border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }
    .hint { margin: 16px 0 0; padding: 10px; border-radius: 10px; background: color-mix(in srgb, var(--accent) 8%, transparent); color: var(--muted); font-size: 13px; }
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; margin-top: 14px; }
    .stat { padding: 9px; border: 1px solid var(--border); border-radius: 9px; }
    .stat b { display: block; font-size: 19px; line-height: 1.1; }
    .stat span { color: var(--muted); font-size: 11px; overflow-wrap: anywhere; }
    .editor { overflow: hidden; min-height: 620px; }
    .editor-head { padding: 13px 14px; border-bottom: 1px solid var(--border); justify-content: space-between; }
    .toolbar { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .toolbar input { min-width: 150px; flex: 1 1 220px; }
    .editor-area { position: relative; padding: 12px; }
    textarea#editor {
      display: block; min-height: 530px; resize: vertical; border-radius: 9px; padding: 12px;
      font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      tab-size: 2; white-space: pre; overflow: auto;
    }
    .issues { display: none; border-top: 1px solid var(--border); padding: 10px 14px; max-height: 190px; overflow: auto; }
    .issues.show { display: block; }
    .issue { padding: 6px 8px; border-radius: 7px; margin: 3px 0; background: var(--error-bg); font: 12px/1.4 ui-monospace, monospace; }
    .issue.warning { background: var(--warn-bg); }
    .empty { color: var(--muted); text-align: center; padding: 32px 12px; }
    dialog { width: min(560px, calc(100% - 28px)); color: var(--text); background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); padding: 0; }
    dialog::backdrop { background: rgba(0,0,0,.42); }
    dialog form { padding: 18px; }
    dialog h3 { margin: 0 0 13px; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .toast { position: fixed; left: 50%; bottom: max(20px, env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none; transition: .2s ease; max-width: calc(100vw - 30px); color: white; background: #17212f; border-radius: 999px; padding: 10px 14px; box-shadow: var(--shadow); z-index: 5; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 880px) {
      .app { padding: 12px; }
      header { align-items: center; }
      .workspace { grid-template-columns: 1fr; }
      aside { min-height: auto; }
      .file-list { max-height: 220px; }
      .settings-grid { grid-template-columns: 1fr; }
      .editor { min-height: auto; }
      textarea#editor { min-height: 430px; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Quantumult X List 编辑器</h1>
        <p class="subtitle">直接读取、校验并提交 GitHub 中的 .list 分流规则。</p>
      </div>
      <span class="badge" id="dirtyBadge">未加载文件</span>
    </header>

    <details class="panel settings" open>
      <summary>GitHub 连接设置</summary>
      <div class="settings-grid">
        <label>规则仓库
          <input id="repoInput" value="clxmhcs/quantumult-X-fenliu" autocomplete="off" spellcheck="false">
        </label>
        <label>分支
          <input id="branchInput" value="main" autocomplete="off" spellcheck="false">
        </label>
        <label>GitHub Fine-grained Personal Access Token（仅保存到当前浏览器会话）
          <input id="tokenInput" type="password" placeholder="github_pat_…" autocomplete="off" spellcheck="false">
        </label>
      </div>
      <div class="settings-actions">
        <button class="button primary" id="refreshFilesBtn" type="button">读取规则文件</button>
        <button class="button" id="clearTokenBtn" type="button">清除 Token</button>
        <span class="status" id="status" aria-live="polite"></span>
      </div>
    </details>

    <section class="workspace">
      <aside class="panel">
        <div class="inline">
          <h2>规则文件</h2>
          <button class="button" id="newFileBtn" type="button">新建</button>
        </div>
        <div class="file-list" id="fileList"><div class="empty">点击“读取规则文件”</div></div>
        <div class="stat-grid" id="statGrid"></div>
        <div class="hint">读取公开仓库不需要 Token；保存到 GitHub 时需要对规则仓库拥有“Contents: Read and write”权限的 Fine-grained Token。Token 不会写入仓库，也不会上传到其他服务。</div>
      </aside>

      <section class="panel editor">
        <div class="editor-head">
          <div>
            <h2 id="currentFile">尚未选择文件</h2>
            <span class="status" id="fileMeta"></span>
          </div>
          <div class="inline">
            <button class="button" id="downloadBtn" type="button">下载 .list</button>
            <button class="button primary" id="saveBtn" type="button">提交到 GitHub</button>
          </div>
        </div>
        <div class="toolbar">
          <input id="searchInput" placeholder="查找域名、策略或规则" autocomplete="off" spellcheck="false">
          <button class="button" id="findBtn" type="button">下一个</button>
          <button class="button" id="addRuleBtn" type="button">新增规则</button>
          <button class="button" id="formatBtn" type="button">整理格式</button>
          <button class="button" id="dedupeBtn" type="button">规则去重</button>
          <button class="button" id="syncHeaderBtn" type="button">更新头部统计</button>
          <button class="button" id="validateBtn" type="button">校验</button>
        </div>
        <div class="editor-area">
          <textarea id="editor" aria-label="Quantumult X 规则文本" placeholder="# NAME: My List&#10;HOST,example.com,Proxy" spellcheck="false" wrap="off" disabled></textarea>
        </div>
        <div class="issues" id="issues"></div>
      </section>
    </section>
  </main>

  <dialog id="ruleDialog">
    <form method="dialog" id="ruleForm">
      <h3>新增 Quantumult X 规则</h3>
      <label>规则类型
        <select id="newRuleType">
          <option>HOST</option><option>HOST-SUFFIX</option><option>HOST-KEYWORD</option>
          <option>IP-CIDR</option><option>IP6-CIDR</option><option>GEOIP</option>
          <option>USER-AGENT</option><option>URL-REGEX</option><option>PROCESS-NAME</option>
        </select>
      </label>
      <label>匹配内容
        <input id="newRuleValue" placeholder="例如 apps.apple.com" autocomplete="off" spellcheck="false" required>
      </label>
      <label>策略组 / 动作
        <input id="newRulePolicy" placeholder="例如 Apple、direct、reject" autocomplete="off" spellcheck="false" required>
      </label>
      <div class="dialog-actions">
        <button class="button" value="cancel" type="submit">取消</button>
        <button class="button primary" id="confirmAddRule" value="default" type="submit">添加</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);
      const els = {
        repo: $("repoInput"), branch: $("branchInput"), token: $("tokenInput"), status: $("status"),
        files: $("fileList"), stats: $("statGrid"), editor: $("editor"), currentFile: $("currentFile"),
        fileMeta: $("fileMeta"), dirty: $("dirtyBadge"), issues: $("issues"), toast: $("toast"),
        search: $("searchInput"), ruleDialog: $("ruleDialog"), ruleForm: $("ruleForm"),
        newType: $("newRuleType"), newValue: $("newRuleValue"), newPolicy: $("newRulePolicy")
      };
      const state = { files: [], path: "", sha: "", original: "", findStart: 0, toastTimer: null };
      const knownTypes = new Set([
        "HOST", "HOST-SUFFIX", "HOST-KEYWORD", "IP-CIDR", "IP6-CIDR", "GEOIP", "USER-AGENT",
        "URL-REGEX", "PROCESS-NAME", "PROCESS-PATH", "AND", "OR", "NOT", "FINAL", "PORT-WILDCARD"
      ]);
      const headerTypes = ["HOST", "HOST-KEYWORD", "HOST-SUFFIX", "HOST-WILDCARD", "IP-CIDR", "IP6-CIDR", "USER-AGENT", "TOTAL"];

      function notify(message, kind = "") {
        clearTimeout(state.toastTimer);
        els.toast.textContent = message;
        els.toast.className = "toast show " + kind;
        state.toastTimer = setTimeout(() => { els.toast.className = "toast"; }, 3000);
      }
      function setStatus(text, kind = "") {
        els.status.textContent = text;
        els.status.className = "status " + kind;
      }
      function token() { return els.token.value.trim(); }
      function repo() { return els.repo.value.trim().replace(/^https?:\/\/github\.com\//i, "").replace(/\/$/, ""); }
      function branch() { return els.branch.value.trim() || "main"; }
      function validRepo() { return /^[^/\s]+\/[^/\s]+$/.test(repo()); }
      function headers(withToken = true) {
        const h = { "Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28" };
        if (withToken && token()) h.Authorization = `Bearer ${token()}`;
        return h;
      }
      function api(path) { return `https://api.github.com/repos/${repo()}/${path}`; }
      function unicodeToBase64(value) {
        const bytes = new TextEncoder().encode(value);
        let binary = "";
        for (const b of bytes) binary += String.fromCharCode(b);
        return btoa(binary);
      }
      function base64ToUnicode(value) {
        const binary = atob(value.replace(/\n/g, ""));
        const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      }
      function escapeHtml(value) {
        return value.replace(/[&<>'\"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "'":"&#39;", "\"":"&quot;" })[c]);
      }
      function isRule(line) { return line.trim() && !line.trimStart().startsWith("#"); }
      function partsOf(line) { return line.split(",").map(x => x.trim()); }
      function countRules(text) {
        const counts = {};
        let total = 0;
        for (const raw of text.replace(/\r\n/g, "\n").split("\n")) {
          if (!isRule(raw)) continue;
          const type = partsOf(raw)[0].toUpperCase();
          counts[type] = (counts[type] || 0) + 1;
          total++;
        }
        counts.TOTAL = total;
        return counts;
      }
      function updateStats() {
        const counts = countRules(els.editor.value);
        const main = ["TOTAL", "HOST", "HOST-SUFFIX", "HOST-KEYWORD", "IP-CIDR", "IP6-CIDR", "GEOIP", "USER-AGENT"];
        els.stats.innerHTML = main.filter(k => counts[k] || k === "TOTAL").map(k =>
          `<div class="stat"><b>${counts[k] || 0}</b><span>${escapeHtml(k)}</span></div>`).join("");
        const modified = Boolean(state.path) && els.editor.value !== state.original;
        els.dirty.textContent = !state.path ? "未加载文件" : (modified ? "有未保存修改" : "已同步");
      }
      function lineNumberAt(position) { return els.editor.value.slice(0, position).split("\n").length; }
      function normaliseLine(line) {
        if (!isRule(line)) return line.replace(/[ \t]+$/g, "");
        return partsOf(line).join(",");
      }
      function formatText() {
        const hadFinalNewline = /\n$/.test(els.editor.value);
        const result = els.editor.value.replace(/\r\n/g, "\n").split("\n").map(normaliseLine).join("\n");
        els.editor.value = hadFinalNewline ? result : result.replace(/\n$/, "");
        changed("已整理规则格式");
      }
      function dedupeText() {
        const seen = new Set();
        let removed = 0;
        const lines = els.editor.value.replace(/\r\n/g, "\n").split("\n").filter(line => {
          if (!isRule(line)) return true;
          const key = normaliseLine(line);
          if (seen.has(key)) { removed++; return false; }
          seen.add(key); return true;
        });
        els.editor.value = lines.join("\n");
        changed(removed ? `已移除 ${removed} 条重复规则` : "没有完全重复的规则");
      }
      function dateTime() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      }
      function syncHeaders() {
        const counts = countRules(els.editor.value);
        const lines = els.editor.value.replace(/\r\n/g, "\n").split("\n");
        let changedAny = false;
        const newLines = lines.map(line => {
          let match = line.match(/^(#\s*UPDATED\s*:\s*).*/i);
          if (match) { changedAny = true; return `${match[1]}${dateTime()}`; }
          match = line.match(/^#\s*([A-Z0-9-]+)\s*:\s*\d+\s*$/i);
          if (match) {
            const key = match[1].toUpperCase();
            if (headerTypes.includes(key)) { changedAny = true; return `# ${key}: ${counts[key] || 0}`; }
          }
          return line;
        });
        els.editor.value = newLines.join("\n");
        changed(changedAny ? "已更新现有头部统计" : "当前文件没有可更新的统计头部");
      }
      function validateText() {
        const issues = [];
        const lines = els.editor.value.replace(/\r\n/g, "\n").split("\n");
        lines.forEach((raw, index) => {
          const line = raw.trim();
          if (!line || line.startsWith("#")) return;
          const parts = partsOf(raw);
          const type = (parts[0] || "").toUpperCase();
          if (!type) issues.push({ kind: "error", line: index + 1, msg: "缺少规则类型" });
          else if (!knownTypes.has(type)) issues.push({ kind: "warning", line: index + 1, msg: `未识别类型 ${type}，保留但请人工确认` });
          if (parts.length < 2 || !parts[1]) issues.push({ kind: "error", line: index + 1, msg: "缺少匹配内容或策略" });
          if (type !== "FINAL" && parts.length < 3) issues.push({ kind: "error", line: index + 1, msg: "缺少策略组 / 动作" });
          if ((type === "IP-CIDR" || type === "IP6-CIDR") && parts[1] && !/^.+\/\d{1,3}$/.test(parts[1])) {
            issues.push({ kind: "warning", line: index + 1, msg: "CIDR 格式可能不完整" });
          }
        });
        if (!issues.length) {
          els.issues.innerHTML = '<div class="issue" style="background:var(--ok-bg)">校验通过：未发现基础格式问题。</div>';
          els.issues.classList.add("show");
          notify("校验通过", "ok");
          return true;
        }
        els.issues.innerHTML = issues.map(i => `<div class="issue ${i.kind === "warning" ? "warning" : ""}" data-line="${i.line}">第 ${i.line} 行：${escapeHtml(i.msg)}</div>`).join("");
        els.issues.classList.add("show");
        els.issues.querySelectorAll("[data-line]").forEach(node => node.addEventListener("click", () => gotoLine(Number(node.dataset.line))));
        notify(`发现 ${issues.length} 个待检查项`);
        return !issues.some(i => i.kind === "error");
      }
      function gotoLine(lineNo) {
        const lines = els.editor.value.split("\n");
        const start = lines.slice(0, Math.max(0, lineNo - 1)).join("\n").length + (lineNo > 1 ? 1 : 0);
        const end = start + (lines[lineNo - 1] || "").length;
        els.editor.focus();
        els.editor.setSelectionRange(start, end);
        const ratio = (lineNo - 1) / Math.max(1, lines.length - 1);
        els.editor.scrollTop = ratio * (els.editor.scrollHeight - els.editor.clientHeight);
      }
      function changed(message = "") {
        updateStats();
        if (message) notify(message);
      }
      function renderFiles() {
        if (!state.files.length) { els.files.innerHTML = '<div class="empty">未找到 .list 文件</div>'; return; }
        els.files.innerHTML = state.files.map(file => `<button class="file-item ${file.path === state.path ? "active" : ""}" type="button" data-path="${escapeHtml(file.path)}">${escapeHtml(file.path)}</button>`).join("");
        els.files.querySelectorAll("[data-path]").forEach(btn => btn.addEventListener("click", () => loadFile(btn.dataset.path)));
      }
      async function readJson(url, options = {}) {
        const res = await fetch(url, options);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || `GitHub 请求失败（${res.status}）`);
        return data;
      }
      async function loadFiles() {
        if (!validRepo()) { setStatus("仓库格式应为 用户名/仓库名", "error"); return; }
        setStatus("正在读取 .list 文件…");
        els.files.innerHTML = '<div class="empty">正在读取…</div>';
        try {
          const tree = await readJson(api(`git/trees/${encodeURIComponent(branch())}?recursive=1`), { headers: headers(false) });
          state.files = (tree.tree || []).filter(item => item.type === "blob" && /\.list$/i.test(item.path)).sort((a, b) => a.path.localeCompare(b.path, "zh-CN"));
          renderFiles();
          setStatus(`找到 ${state.files.length} 个 .list 文件`, "ok");
          if (state.files.length) {
            const preferred = state.files.find(f => /(^|\/)Apple\.list$/i.test(f.path)) || state.files[0];
            await loadFile(preferred.path);
          }
        } catch (err) {
          state.files = [];
          renderFiles();
          setStatus(err.message, "error");
        }
      }
      async function loadFile(path) {
        if (state.path && els.editor.value !== state.original && !confirm("当前文件有未保存修改。仍然切换文件吗？")) return;
        setStatus(`正在读取 ${path}…");
        try {
          const data = await readJson(api(`contents/${path.split("/").map(encodeURIComponent).join("/")}?ref=${encodeURIComponent(branch())}`), { headers: headers(false) });
          if (Array.isArray(data)) throw new Error("目标路径是文件夹，不是 .list 文件");
          state.path = path;
          state.sha = data.sha;
          state.original = base64ToUnicode(data.content || "");
          els.editor.value = state.original;
          els.editor.disabled = false;
          els.currentFile.textContent = path;
          els.fileMeta.textContent = `${countRules(state.original).TOTAL || 0} 条规则 · Git SHA ${data.sha.slice(0, 7)}`;
          els.issues.classList.remove("show");
          renderFiles(); updateStats(); setStatus("文件已加载", "ok");
        } catch (err) { setStatus(err.message, "error"); }
      }
      async function saveFile() {
        if (!state.path) { notify("请先选择一个 .list 文件"); return; }
        if (!token()) { notify("保存需要填写 GitHub Token"); els.token.focus(); return; }
        if (!validateText()) { notify("请先处理红色格式错误"); return; }
        try {
          setStatus("正在检查远程版本…");
          const pathApi = `contents/${state.path.split("/").map(encodeURIComponent).join("/")}`;
          const latest = await readJson(api(`${pathApi}?ref=${encodeURIComponent(branch())}`), { headers: headers() });
          let sha = latest.sha;
          if (latest.sha !== state.sha && !confirm("GitHub 上的文件已被其他修改更新。继续将当前编辑内容覆盖到远程版本吗？")) {
            setStatus("已取消保存"); return;
          }
          setStatus("正在提交到 GitHub…");
          const body = {
            message: `编辑 ${state.path}`,
            content: unicodeToBase64(els.editor.value.replace(/\r\n/g, "\n")),
            branch: branch(), sha
          };
          const result = await readJson(api(pathApi), { method: "PUT", headers: { ...headers(), "Content-Type": "application/json" }, body: JSON.stringify(body) });
          state.sha = result.content?.sha || state.sha;
          state.original = els.editor.value;
          els.fileMeta.textContent = `${countRules(state.original).TOTAL || 0} 条规则 · Git SHA ${state.sha.slice(0, 7)}`;
          updateStats(); setStatus("已提交到 GitHub", "ok"); notify("保存成功，Quantumult X 更新资源后即可获取新规则", "ok");
        } catch (err) { setStatus(err.message, "error"); notify("保存失败：请检查 Token 权限与仓库设置"); }
      }
      function downloadFile() {
        const name = state.path ? state.path.split("/").pop() : "QuantumultX.list";
        const blob = new Blob([els.editor.value.replace(/\r\n/g, "\n")], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = name; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }
      function findNext() {
        const query = els.search.value;
        if (!query) { els.search.focus(); return; }
        const text = els.editor.value;
        const start = Math.max(0, els.editor.selectionEnd || state.findStart);
        let found = text.toLowerCase().indexOf(query.toLowerCase(), start);
        if (found < 0) found = text.toLowerCase().indexOf(query.toLowerCase(), 0);
        if (found < 0) { notify("没有找到匹配内容"); return; }
        els.editor.focus(); els.editor.setSelectionRange(found, found + query.length);
        state.findStart = found + query.length;
        gotoLine(lineNumberAt(found));
      }
      async function newFile() {
        if (!token()) { notify("新建文件需要 GitHub Token"); els.token.focus(); return; }
        const path = prompt("新文件路径（必须以 .list 结尾），例如 Custom/MyRules.list：", "Custom/NewRules.list");
        if (!path) return;
        if (!/\.list$/i.test(path) || path.startsWith("/") || path.includes("..")) { notify("文件路径无效"); return; }
        const content = "# NAME: New List\n# UPDATED: " + dateTime() + "\n# TOTAL: 0\n";
        try {
          setStatus("正在新建文件…");
          await readJson(api(`contents/${path.split("/").map(encodeURIComponent).join("/")}`), {
            method: "PUT", headers: { ...headers(), "Content-Type": "application/json" },
            body: JSON.stringify({ message: `新建 ${path}`, content: unicodeToBase64(content), branch: branch() })
          });
          setStatus("文件已创建", "ok");
          await loadFiles();
          await loadFile(path);
        } catch (err) { setStatus(err.message, "error"); }
      }

      $("refreshFilesBtn").addEventListener("click", loadFiles);
      $("clearTokenBtn").addEventListener("click", () => { els.token.value = ""; sessionStorage.removeItem("qx-list-editor-token"); notify("已清除当前会话 Token"); });
      $("newFileBtn").addEventListener("click", newFile);
      $("saveBtn").addEventListener("click", saveFile);
      $("downloadBtn").addEventListener("click", downloadFile);
      $("findBtn").addEventListener("click", findNext);
      $("addRuleBtn").addEventListener("click", () => { if (!state.path) return notify("请先加载一个文件"); els.ruleDialog.showModal(); els.newValue.focus(); });
      $("formatBtn").addEventListener("click", formatText);
      $("dedupeBtn").addEventListener("click", dedupeText);
      $("syncHeaderBtn").addEventListener("click", syncHeaders);
      $("validateBtn").addEventListener("click", validateText);
      els.editor.addEventListener("input", () => changed());
      els.editor.addEventListener("keydown", (event) => {
        if (event.key === "Tab") { event.preventDefault(); const s = els.editor.selectionStart; const e = els.editor.selectionEnd; els.editor.setRangeText("  ", s, e, "end"); changed(); }
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "s") { event.preventDefault(); saveFile(); }
      });
      els.search.addEventListener("keydown", event => { if (event.key === "Enter") findNext(); });
      els.ruleForm.addEventListener("submit", event => {
        if (event.submitter?.id !== "confirmAddRule") return;
        event.preventDefault();
        const line = `${els.newType.value},${els.newValue.value.trim()},${els.newPolicy.value.trim()}`;
        if (!els.newValue.value.trim() || !els.newPolicy.value.trim()) return;
        els.editor.value = els.editor.value.replace(/\s*$/, "") + (els.editor.value.trim() ? "\n" : "") + line + "\n";
        els.ruleDialog.close(); els.newValue.value = ""; els.newPolicy.value = ""; changed("已新增规则");
      });
      els.token.addEventListener("input", () => sessionStorage.setItem("qx-list-editor-token", els.token.value));
      window.addEventListener("beforeunload", event => { if (state.path && els.editor.value !== state.original) { event.preventDefault(); event.returnValue = ""; } });
      els.token.value = sessionStorage.getItem("qx-list-editor-token") || "";
      updateStats();
    })();
  </script>
</body>
</html>
